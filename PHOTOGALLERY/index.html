<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Photo Gallery</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Header -->

    <div class="top-bar">

        <h1>PHOTO GALLERY</h1>
        <p>Responsive Image Gallery using Bootstrap</p>

    </div>

    <!-- Gallery -->

    <div class="container py-5">

        <div class="row g-4">

            <!-- Image 1 -->

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">

                <div class="gallery-item">

                    <img src="images/fashion/fashion1.jpg" alt="Fashion Style">

                    <div class="overlay">
                        <h3>Fashion Style</h3>
                    </div>

                </div>

            </div>

            <!-- Image 2 -->

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">

                <div class="gallery-item">

                    <img src="images/fashion/fashion2.jpg" alt="Modern Portrait">

                    <div class="overlay">
                        <h3>Modern Portrait</h3>
                    </div>

                </div>

            </div>

            <!-- Image 3 -->

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">

                <div class="gallery-item">

                    <img src="images/animals/animal1.jpg" alt="Wild Animals">

                    <div class="overlay">
                        <h3>Wild Animals</h3>
                    </div>

                </div>

            </div>

            <!-- Image 4 -->

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">

                <div class="gallery-item">

                    <img src="images/animals/animal2.jpg" alt="Nature Wildlife">

                    <div class="overlay">
                        <h3>Nature Wildlife</h3>
                    </div>

                </div>

            </div>

            <!-- Image 5 -->

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">

                <div class="gallery-item">

                    <img src="images/cars/car1.jpg" alt="Luxury Cars">

                    <div class="overlay">
                        <h3>Luxury Cars</h3>
                    </div>

                </div>

            </div>

            <!-- Image 6 -->

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">

                <div class="gallery-item">

                    <img src="images/cars/car2.jpg" alt="Sports Cars">

                    <div class="overlay">
                        <h3>Sports Cars</h3>
                    </div>

                </div>

            </div>

            <!-- Image 7 -->

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">

                <div class="gallery-item">

                    <img src="images/nature/nature1.jpg" alt="Beautiful Nature">

                    <div class="overlay">
                        <h3>Beautiful Nature</h3>
                    </div>

                </div>

            </div>

            <!-- Image 8 -->

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">

                <div class="gallery-item">

                    <img src="images/nature/nature2.jpg" alt="Mountain View">

                    <div class="overlay">
                        <h3>Mountain View</h3>
                    </div>

                </div>

            </div>
            <!-- Image 9 -->

            <div class="col-12 col-sm-6 col-md-4 col-lg-3">

                <div class="gallery-item">

                    <img src="images/foods/food1.jpg" alt="Meals">

                    <div class="overlay">
                        <h3>South Indian Meals</h3>
                    </div>

                </div>

            </div>
            <!-- Image 10 -->
            <div class="col-12 col-sm-6 col-md-4 col-lg-3">

                <div class="gallery-item">

                    <img src="images/foods/food2.jpg" alt="Food">

                    <div class="overlay">
                        <h3>Junk Food</h3>
                    </div>

                </div>
            </div>
            <!-- Image 11 -->
            <div class="col-12 col-sm-6 col-md-4 col-lg-3">

                <div class="gallery-item">

                    <img src="images/mehandi/mehandi1.jpg" alt="Mehandi">

                    <div class="overlay">
                        <h3>Hand Mehandi</h3>
                    </div>

                </div>
            </div>


            <!-- Image 12-->
            <div class="col-12 col-sm-6 col-md-4 col-lg-3">

                <div class="gallery-item">

                    <img src="images/mehandi/mehandi2.jpg" alt="Girl Aesthetic">

                    <div class="overlay">
                        <h3>Mehandi Show Aesthetic</h3>
                    </div>

                </div>
            </div>

        </div>

    </div>



    <!-- Modal -->

    <div class="modal-custom" id="modal">

        <span class="close">&times;</span>

        <img class="modal-content-custom" id="modal-img">

    </div>


    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->

    <script src="script.js"></script>

</body>

</html>
